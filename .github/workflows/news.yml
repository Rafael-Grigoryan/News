name: Anthropic News Bot

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC)
  workflow_dispatch:          # manual trigger for testing

permissions:
  contents: write             # required to commit seen.json back to the repo

concurrency:
  group: news-bot
  cancel-in-progress: false   # never run two instances at once

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
        run: python -m src.main

      - name: Commit state
        run: |
          git config user.name  "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/seen.json
          git diff --staged --quiet || git commit -m "update seen state [skip ci]"
          git push
